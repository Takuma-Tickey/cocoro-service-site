name: Deploy to Onamae SFTP

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        type: choice
        options:
          - staging
          - production
      ref:
        description: "Git ref (branch/tag/commit)"
        required: true
        default: "main"
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy (${{ inputs.target }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.target }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync sshpass

      - name: Validate secrets
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_PRIVATE_KEY: ${{ secrets.SFTP_PRIVATE_KEY }}
          SFTP_REMOTE_PATH: ${{ secrets.SFTP_REMOTE_PATH }}
        run: |
          set -eu
          : "${SFTP_HOST:?SFTP_HOST is required}"
          : "${SFTP_PORT:?SFTP_PORT is required}"
          : "${SFTP_USERNAME:?SFTP_USERNAME is required}"
          : "${SFTP_REMOTE_PATH:?SFTP_REMOTE_PATH is required}"
          if [ -z "${SFTP_PASSWORD:-}" ] && [ -z "${SFTP_PRIVATE_KEY:-}" ]; then
            echo "Either SFTP_PASSWORD or SFTP_PRIVATE_KEY is required." >&2
            exit 1
          fi
          echo "Target remote path: ${SFTP_REMOTE_PATH}"

      - name: Prepare SSH key (optional)
        env:
          SFTP_PRIVATE_KEY: ${{ secrets.SFTP_PRIVATE_KEY }}
        run: |
          set -eu
          if [ -z "${SFTP_PRIVATE_KEY:-}" ]; then
            echo "SFTP_PRIVATE_KEY is empty. Skip key setup."
            exit 0
          fi
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          echo "${SFTP_PRIVATE_KEY}" | tr -d '\r' > "${HOME}/.ssh/id_ed25519"
          chmod 600 "${HOME}/.ssh/id_ed25519"

      - name: Deploy files via rsync over SSH
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_PRIVATE_KEY: ${{ secrets.SFTP_PRIVATE_KEY }}
          SFTP_REMOTE_PATH: ${{ secrets.SFTP_REMOTE_PATH }}
        run: |
          set -eu
          EXCLUDES=(
            "--exclude=.git/"
            "--exclude=.github/"
            "--exclude=.DS_Store"
            "--exclude=*.log"
            "--exclude=wp-config.php"
            "--exclude=phpinfo.php"
            "--exclude=wp-content/uploads/"
            "--exclude=wp-content/ewww/"
            "--exclude=wp-content/cache/"
            "--exclude=wp-content/upgrade/"
            "--exclude=wp-content/languages/"
            "--exclude=wp-content/w3tc-config/"
          )

          if [ -n "${SFTP_PRIVATE_KEY:-}" ]; then
            SSH_CMD="ssh -i ${HOME}/.ssh/id_ed25519 -p ${SFTP_PORT} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
            ${SSH_CMD} "${SFTP_USERNAME}@${SFTP_HOST}" "mkdir -p '${SFTP_REMOTE_PATH}'"
            rsync -az --omit-dir-times --no-perms --no-owner --no-group \
              -e "${SSH_CMD}" \
              "${EXCLUDES[@]}" \
              "${GITHUB_WORKSPACE}/" \
              "${SFTP_USERNAME}@${SFTP_HOST}:${SFTP_REMOTE_PATH}/"
          else
            SSHPASS="${SFTP_PASSWORD}" sshpass -e ssh -p "${SFTP_PORT}" -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "${SFTP_USERNAME}@${SFTP_HOST}" "mkdir -p '${SFTP_REMOTE_PATH}'"
            RSYNC_RSH="sshpass -e ssh -p ${SFTP_PORT} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
            SSHPASS="${SFTP_PASSWORD}" rsync -az --omit-dir-times --no-perms --no-owner --no-group \
              -e "${RSYNC_RSH}" \
              "${EXCLUDES[@]}" \
              "${GITHUB_WORKSPACE}/" \
              "${SFTP_USERNAME}@${SFTP_HOST}:${SFTP_REMOTE_PATH}/"
          fi
