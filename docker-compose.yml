services:
  db:
    image: mariadb:10.11
    container_name: cocoro-local-db
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${WORDPRESS_DB_NAME:-cocoro_local}
      MYSQL_USER: ${WORDPRESS_DB_USER:-cocoro}
      MYSQL_PASSWORD: ${WORDPRESS_DB_PASSWORD:-cocoro_pass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root_pass}"]
      interval: 10s
      timeout: 5s
      retries: 20

  wordpress:
    image: wordpress:php8.2-apache
    container_name: cocoro-local-wp
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${WP_PORT:-8080}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-cocoro_local}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-cocoro}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-cocoro_pass}
      WP_HOME: ${WP_HOME:-http://localhost:8080}
      WP_SITEURL: ${WP_SITEURL:-http://localhost:8080}
      WP_DEBUG: ${WP_DEBUG:-1}
      WP_ENVIRONMENT_TYPE: ${WP_ENVIRONMENT_TYPE:-local}
      COCORO_SLACK_WEBHOOK_URL: ${COCORO_SLACK_WEBHOOK_URL:-}
    volumes:
      - ./:/var/www/html
      - ./docker/wp-config.local.php:/var/www/html/wp-config.php:ro

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: cocoro-local-pma
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PMA_PORT:-8081}:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: ${WORDPRESS_DB_USER:-cocoro}
      PMA_PASSWORD: ${WORDPRESS_DB_PASSWORD:-cocoro_pass}

volumes:
  db_data:
